<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="centerDashboard" class="dashboard-container">

    <section class="dashboard-top-grid">
        <div class="summary-column">
            <article class="summary-card metric-card">
                <div class="metric-card__header">
                    <span class="metric-card__title">체중</span>
                    <span class="metric-card__icon">⚖</span>
                </div>
                <div class="metric-card__value-row">
                    <strong class="metric-card__value" th:text="${weight} != null ? ${weight} + 'kg' : '—kg'">—kg</strong>
                </div>
                <p class="metric-card__meta" th:text="${weightDiffText}">기록 없음</p>
            </article>

            <article class="summary-card progress-card">
                <div class="progress-card__header">
                    <span class="progress-card__title">소모 칼로리</span>
                    <span class="metric-card__icon metric-card__icon--mint">🔥</span>
                </div>

                <div class="progress-card__chart-wrap">
                    <canvas id="burnedProgressChart"></canvas>
                    <div class="progress-card__center">
                        <strong th:text="${burnedPercent} + '%'">0%</strong>
                        <span>달성</span>
                    </div>
                </div>

                <p class="progress-card__meta" th:text="|${burnedCalories} / ${targetCalories} kcal|">0 / 2200 kcal</p>
            </article>
        </div>

        <div class="summary-column">
            <article class="summary-card metric-card">
                <div class="metric-card__header">
                    <span class="metric-card__title">연속 기록</span>
                    <span class="metric-card__icon">🔗</span>
                </div>
                <div class="streak-row">
                    <strong class="metric-card__value metric-card__value--streak" th:text="${streakDays}">0</strong>
                    <span class="metric-card__unit">일</span>
                </div>
                <p class="metric-card__meta" th:text="${streakMessage}">오늘 기록 없음</p>
            </article>

            <article class="summary-card progress-card">
                <div class="progress-card__header">
                    <span class="progress-card__title">섭취 칼로리</span>
                    <span class="metric-card__icon">🍽️</span>
                </div>

                <div class="progress-card__chart-wrap">
                    <canvas id="intakeProgressChart"></canvas>
                    <div class="progress-card__center">
                        <strong th:text="${intakePercent} + '%'">0%</strong>
                        <span>달성</span>
                    </div>
                </div>

                <p class="progress-card__meta" th:text="|${intakeCalories} / ${targetCalories} kcal|">0 / 2200 kcal</p>
            </article>
        </div>

        <article class="summary-card nutrition-panel">
            <div class="nutrition-panel__title">오늘의 영양소</div>
            <div class="nutrition-panel__body">
                <div class="nutrition-panel__chart-wrap">
                    <canvas id="macroChart"></canvas>
                </div>

                <div class="nutrition-panel__legend">
                    <div class="macro-item macro-item--carb">
                        <span class="macro-item__label">탄수화물</span>
                        <strong th:text="${carbGram} + 'g'">0g</strong>
                    </div>
                    <div class="macro-item macro-item--fat">
                        <span class="macro-item__label">지방</span>
                        <strong th:text="${fatGram} + 'g'">0g</strong>
                    </div>
                    <div class="macro-item macro-item--protein">
                        <span class="macro-item__label">단백질</span>
                        <strong th:text="${proteinGram} + 'g'">0g</strong>
                    </div>
                </div>
            </div>
        </article>
    </section>

    <section class="summary-card chart-panel">
        <div class="chart-panel__title">주간 체중</div>
        <div class="chart-panel__body">
            <canvas id="weightChart"></canvas>
        </div>
    </section>

</div>
</body>
</html>
