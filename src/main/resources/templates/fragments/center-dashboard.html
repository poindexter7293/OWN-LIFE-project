<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">


<body>
<div th:fragment="centerDashboard" class="dashboard-container">

    <div class="dashboard-guard">
        <div class="dashboard-guarded"
             th:classappend="${session.loginMember == null} ? ' dashboard-guarded--blur' : ''">

            <section class="dashboard-top-grid">
                <div class="summary-column">

                    <!-- 체중 카드 -->
                    <article class="summary-card metric-card metric-card--center hover-card dashboard-link-card"
                             tabindex="0"
                             role="button"
                             data-dashboard-link
                             data-href="/mypage?focus=weightKg"
                             data-confirm-message="체중을 수정하시겠습니까?">

                        <div class="metric-card__header">
                            <span class="metric-card__title">체중</span>
                            <span class="metric-card__icon">⚖️</span>
                        </div>

                        <div class="metric-card__center-content metric-card__center-content--raised metric-card__center-content--weight">


                            <p class="metric-card__goal-text"
                               th:if="${dashboard.goalWeightText != null and !#strings.isEmpty(dashboard.goalWeightText)}"
                               th:text="${dashboard.goalWeightText}">
                                목표체중 : 0kg
                            </p>

                            <p class="metric-card__goal-text"
                               th:unless="${dashboard.goalWeightText != null and !#strings.isEmpty(dashboard.goalWeightText)}">
                                목표체중 미설정
                            </p>

                            <strong class="metric-card__value count-up-weight"
                                    th:data-target="${dashboard.weight != null ? dashboard.weight : 0}"
                                    th:text="${dashboard.weight != null ? dashboard.weight : 0} + 'kg'">
                                0kg
                            </strong>

                            <p class="metric-card__meta metric-card__meta--accent metric-card__meta--weight"
                               th:if="${dashboard.weightDiffTone != null and dashboard.weightDiffTone == 'accent'}"
                               th:text="${dashboard.weightDiffText}">
                                기록 없음
                            </p>

                            <p class="metric-card__meta metric-card__meta--muted metric-card__meta--weight"
                               th:unless="${dashboard.weightDiffTone != null and dashboard.weightDiffTone == 'accent'}"
                               th:text="${dashboard.weightDiffText}">
                                기록 없음
                            </p>
                        </div>
                    </article>

                    <!-- 소모 칼로리 카드 -->
                    <article class="summary-card progress-card hover-card dashboard-link-card"
                             tabindex="0"
                             role="button"
                             th:with="goalBurned=${dashboard.burnedTargetCalories != null ? dashboard.burnedTargetCalories : 0}"
                             data-dashboard-link
                             th:data-href="${goalBurned > 0 ? '/exercise' : '/mypage?focus=goalBurnedKcal'}"
                             th:data-confirm-message="${goalBurned > 0 ? '운동일지 페이지로 이동하시겠습니까?' : '목표 소모 칼로리를 설정하시겠습니까?'}">

                        <div class="progress-card__header">
                            <span class="progress-card__title">소모 칼로리</span>
                            <span class="metric-card__icon metric-card__icon--mint">🔥</span>
                        </div>

                        <div class="progress-card__chart-wrap"
                             th:classappend="${goalBurned <= 0} ? ' progress-card__chart-wrap--empty' : ''">

                            <canvas id="burnedProgressChart" th:if="${goalBurned > 0}"></canvas>

                            <div class="progress-card__center" th:if="${goalBurned > 0}">
                                <strong class="count-up-percent"
                                        th:attr="data-target=${dashboard.burnedPercent}"
                                        th:text="${dashboard.burnedPercent} + '%'">0%</strong>
                                <span>달성</span>
                            </div>

                            <div class="progress-card__empty-state" th:if="${goalBurned <= 0}">
                                <div class="progress-card__empty-ring">
                                    <span class="progress-card__empty-label">목표 설정</span>
                                </div>
                            </div>
                        </div>

                        <p class="progress-card__meta"
                           th:if="${goalBurned > 0}"
                           th:text="|${dashboard.burnedCalories} / ${dashboard.burnedTargetCalories} kcal|">
                            0 / 0 kcal
                        </p>

                        <p class="progress-card__meta progress-card__meta--muted"
                           th:if="${goalBurned <= 0}">
                            목표 소모 칼로리를 입력해주세요.
                        </p>
                    </article>
                </div>

                <div class="summary-column">

                    <!-- 연속 기록 카드 -->
                    <article class="summary-card metric-card metric-card--center hover-card dashboard-link-card"
                             tabindex="0"
                             role="button"
                             data-dashboard-link
                             data-href="/exercise"
                             data-confirm-message="운동일지 페이지로 이동하시겠습니까?">
                        <div class="metric-card__header">
                            <span class="metric-card__title">연속 기록</span>
                            <span class="metric-card__icon">🔗</span>
                        </div>

                        <div class="metric-card__center-content metric-card__center-content--raised">
                            <div class="streak-row">
                                <strong class="metric-card__value metric-card__value--streak count-up-int"
                                        th:attr="data-target=${dashboard.streakDays}"
                                        th:text="${dashboard.streakDays}">0</strong>
                                <span class="metric-card__unit">일</span>
                            </div>
                            <p class="metric-card__meta metric-card__meta--accent"
                               th:if="${dashboard.streakTone == 'accent'}"
                               th:text="${dashboard.streakMessage}">
                                기록 없음
                            </p>

                            <p class="metric-card__meta metric-card__meta--danger"
                               th:unless="${dashboard.streakTone == 'accent'}"
                               th:text="${dashboard.streakMessage}">
                                기록 없음
                            </p>
                        </div>
                    </article>

                    <!-- 섭취 칼로리 카드 -->
                    <article class="summary-card progress-card hover-card dashboard-link-card"
                             tabindex="0"
                             role="button"
                             th:with="goalEat=${dashboard.intakeTargetCalories != null ? dashboard.intakeTargetCalories : 0}"
                             data-dashboard-link
                             th:data-href="${goalEat > 0 ? '/diet' : '/mypage?focus=goalEatKcal'}"
                             th:data-confirm-message="${goalEat > 0 ? '식단관리 페이지로 이동하시겠습니까?' : '목표 섭취 칼로리를 입력하시겠습니까?'}">

                        <div class="progress-card__header">
                            <span class="progress-card__title">섭취 칼로리</span>
                            <span class="metric-card__icon">🍽️</span>
                        </div>

                        <div class="progress-card__chart-wrap"
                             th:classappend="${goalEat <= 0} ? ' progress-card__chart-wrap--empty' : ''">

                            <canvas id="intakeProgressChart" th:if="${goalEat > 0}"></canvas>

                            <div class="progress-card__center" th:if="${goalEat > 0}">
                                <strong class="count-up-percent"
                                        th:attr="data-target=${dashboard.intakePercent}"
                                        th:text="${dashboard.intakePercent} + '%'">0%</strong>
                                <span>섭취</span>
                            </div>

                            <div class="progress-card__empty-state" th:if="${goalEat <= 0}">
                                <div class="progress-card__empty-ring">
                                    <span class="progress-card__empty-label">목표 설정</span>
                                </div>
                            </div>
                        </div>

                        <p class="progress-card__meta"
                           th:if="${goalEat > 0}"
                           th:text="|${dashboard.intakeCalories} / ${dashboard.intakeTargetCalories} kcal|">
                            0 / 0 kcal
                        </p>

                        <p class="progress-card__meta progress-card__meta--muted"
                           th:if="${goalEat <= 0}">
                            목표 섭취 칼로리를 입력해주세요.
                        </p>
                    </article>
                </div>

                <!-- 오늘의 영양소 -->
                <article class="summary-card nutrition-panel hover-card dashboard-link-card"
                         tabindex="0"
                         role="button"
                         data-dashboard-link
                         data-href="/diet"
                         data-confirm-message="식단관리 페이지로 이동하시겠습니까?">
                    <div class="nutrition-panel__title">오늘의 영양소</div>

                    <div class="nutrition-panel__body">
                        <div class="nutrition-panel__chart-wrap">
                            <canvas id="macroChart"></canvas>
                        </div>

                        <div class="nutrition-panel__legend">
                            <div class="macro-item macro-item--carb">
                                <span class="macro-item__label">탄수화물</span>
                                <strong class="count-up-gram"
                                        th:attr="data-target=${dashboard.carbGram}"
                                        th:text="${dashboard.carbGram} + 'g'">0g</strong>
                            </div>

                            <div class="macro-item macro-item--fat">
                                <span class="macro-item__label">지방</span>
                                <strong class="count-up-gram"
                                        th:attr="data-target=${dashboard.fatGram}"
                                        th:text="${dashboard.fatGram} + 'g'">0g</strong>
                            </div>

                            <div class="macro-item macro-item--protein">
                                <span class="macro-item__label">단백질</span>
                                <strong class="count-up-gram"
                                        th:attr="data-target=${dashboard.proteinGram}"
                                        th:text="${dashboard.proteinGram} + 'g'">0g</strong>
                            </div>
                        </div>
                    </div>
                </article>
            </section>
            <!-- 통합그래프 -->
            <section class="summary-card chart-panel hover-card">
                <div class="chart-panel__title" id="summaryMixedChartTitle">주간 통합 그래프</div>

                <div class="chart-panel__toolbar">
                    <div class="chart-range-switch">
                        <button type="button" class="chart-range-btn is-active" data-summary-range="week">주간</button>
                        <button type="button" class="chart-range-btn" data-summary-range="month">월간</button>
                        <button type="button" class="chart-range-btn" data-summary-range="year">연간</button>
                    </div>

                    <div class="chart-series-toggle">
                        <label>
                            <input type="checkbox" data-series-key="weightKg" checked>
                            <span class="series-color-dot series-color-dot--weight"></span>
                            체중
                        </label>

                        <label>
                            <input type="checkbox" data-series-key="goalWeight" checked>
                            <span class="series-color-dot series-color-dot--goal-weight"></span>
                            목표체중
                        </label>
                        

                        <label>
                            <input type="checkbox" data-series-key="totalEatKcal" checked>
                            <span class="series-color-dot series-color-dot--eat"></span>
                            섭취칼로리
                        </label>

                        <label>
                            <input type="checkbox" data-series-key="goalEatKcal" checked>
                            <span class="series-color-dot series-color-dot--goal-eat"></span>
                            목표섭취칼로리
                        </label>

                        <label>
                            <input type="checkbox" data-series-key="totalBurnedKcal" checked>
                            <span class="series-color-dot series-color-dot--burn"></span>
                            소모칼로리
                        </label>

                        <label>
                            <input type="checkbox" data-series-key="goalBurnedKcal" checked>
                            <span class="series-color-dot series-color-dot--goal-burn"></span>
                            목표소모칼로리
                        </label>


                        <label>
                            <input type="checkbox" data-series-key="totalCarbG">
                            <span class="series-color-dot series-color-dot--carb"></span>
                            탄수화물
                        </label>

                        <label>
                            <input type="checkbox" data-series-key="totalProteinG">
                            <span class="series-color-dot series-color-dot--protein"></span>
                            단백질
                        </label>

                        <label>
                            <input type="checkbox" data-series-key="totalFatG">
                            <span class="series-color-dot series-color-dot--fat"></span>
                            지방
                        </label>
                    </div>
                </div>

                <div class="chart-panel__body chart-panel__body--large">
                    <canvas id="summaryMixedChart"></canvas>
                </div>
            </section>
        </div>

        <!-- 비로그인 오버레이 -->
        <div class="dashboard-login-overlay" th:if="${session.loginMember == null}">
            <div class="dashboard-login-card">
                <div class="dashboard-login-card__icon">🔒</div>
                <h3>로그인 후 대시보드를 이용할 수 있어요</h3>
                <p>운동, 식단, 체중 기록을 한눈에 확인하실 수 있습니다.</p>
                <div class="dashboard-login-card__actions">
                    <a class="dashboard-login-btn dashboard-login-btn--primary" th:href="@{/login}">로그인</a>
                    <a class="dashboard-login-btn" th:href="@{/signup}">회원가입</a>
                </div>
            </div>
        </div>
    </div>




</div>

</body>
</html>
