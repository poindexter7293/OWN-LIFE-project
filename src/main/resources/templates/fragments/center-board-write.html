<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<section th:fragment="centerBoardWrite">
  <div style="max-width:900px; margin:0 auto; padding:20px;">
    <h1 style="font-size:28px; font-weight:800; margin-bottom:20px;">글쓰기</h1>

    <form th:action="@{/board/write}" method="post">
      <label>제목</label>
      <input type="text" name="title" required
             style="width:100%; padding:12px; margin:10px 0 20px; border:1px solid #ddd; border-radius:8px;">

      <label>내용</label>
      <textarea name="content" required
                style="width:100%; height:250px; padding:12px; margin:10px 0 20px; border:1px solid #ddd; border-radius:8px; resize:none;"></textarea>

      <div style="display:flex; gap:10px;">
        <button type="submit"
                style="padding:10px 16px; background:#4a90e2; color:white; border:none; border-radius:6px; cursor:pointer;">
          등록
        </button>
        <a th:href="@{/board}"
           style="padding:10px 16px; background:#999; color:white; border-radius:6px; text-decoration:none;">
          취소
        </a>
      </div>
    </form>
  </div>
</section>
</body>
</html>
