<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<section th:fragment="centerBoardWrite">
  <div style="max-width:900px; margin:0 auto; padding:20px;">
    <h1 style="font-size:28px; font-weight:800; margin-bottom:20px;">글쓰기</h1>

    <form th:action="@{/board/write}" method="post" enctype="multipart/form-data">
      <label>제목</label>
      <input type="text" name="title" required
             style="width:100%; padding:12px; margin:10px 0 20px; border:1px solid #ddd; border-radius:8px;">

      <label>내용</label>
      <textarea name="content" required
                style="width:100%; height:250px; padding:12px; margin:10px 0 20px; border:1px solid #ddd; border-radius:8px; resize:none;"></textarea>

      <div class="board-upload-section">
        <label class="board-upload-label">이미지 첨부</label>

        <div class="board-upload-row">
          <label for="images" class="board-btn board-btn-secondary">파일 선택</label>
          <span id="fileName" class="board-file-name">선택된 파일 없음</span>
        </div>

        <input type="file" id="images" name="images" accept="image/*" multiple class="board-file-hidden">

        <p class="board-upload-guide">이미지는 최대 3장까지 업로드할 수 있습니다.</p>
      </div>

      <div class="board-form-actions">
        <button type="submit" class="board-btn board-btn-primary">등록</button>
        <a th:href="@{/board}" class="board-btn board-btn-secondary">취소</a>
      </div>
    </form>
  </div>
</section>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const fileInput = document.getElementById("images");
    const fileName = document.getElementById("fileName");

    if (fileInput && fileName) {
      fileInput.addEventListener("change", function () {
        if (!fileInput.files || fileInput.files.length === 0) {
          fileName.textContent = "선택된 파일 없음";
        } else if (fileInput.files.length === 1) {
          fileName.textContent = fileInput.files[0].name;
        } else {
          fileName.textContent = fileInput.files[0].name + " 외 " + (fileInput.files.length - 1) + "개";
        }
      });
    }
  });
</script>
</body>
</html>
