<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<section th:fragment="centerBoardDetail">
    <div class="board-detail-wrap">
        <h1 th:text="${post.title}" style="font-size:28px; font-weight:800; margin-bottom:20px;">제목</h1>

        <div class="board-detail-card">
            <div style="color:#666; margin-bottom:20px;">
                작성자: <span th:text="${post.nickname}">닉네임</span> |
                조회수: <span th:text="${post.viewCount}">0</span> |
                작성일: <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">2026-03-30</span>
            </div>

            <div style="min-height:200px; white-space:pre-wrap;" th:text="${post.content}">내용</div>

            <div th:if="${post.images != null and !#lists.isEmpty(post.images)}" class="post-image-list">
                <div th:each="img : ${post.images}" class="post-image-card">
                    <img th:src="${img.imagePath}"
                         alt="게시글 이미지"
                         class="post-image">
                </div>
            </div>

            <div class="board-detail-actions">
                <a th:href="@{/board}" class="board-btn board-btn-secondary">목록</a>

                <th:block th:if="${post.memberId == loginMemberId}">
                    <a th:href="@{/board/edit/{id}(id=${post.postId})}" class="board-btn board-btn-edit">수정</a>

                    <form th:action="@{/board/delete/{id}(id=${post.postId})}" method="post" class="board-inline-form">
                        <button type="submit" class="board-btn board-btn-delete">삭제</button>
                    </form>
                </th:block>
            </div>
        </div>
    </div>
    <div class="board-comment-wrap">
        <div class="board-comment-card">
            <h3 style="margin-bottom:15px;">댓글</h3>

            <!-- 댓글 목록 -->
            <div class="comment-list">
                <div th:each="comment : ${comments}" class="comment-item">

                    <div class="comment-meta">
                        작성자ID: <span th:text="${comment.nickname}">닉네임</span> |
                        작성일: <span th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}">2026-03-30 12:00</span>
                    </div>

                    <div class="comment-content" th:text="${comment.content}">
                        댓글 내용
                    </div>

                    <th:block th:if="${comment.memberId == loginMemberId}">
                        <form th:action="@{/board/comment/delete/{commentId}(commentId=${comment.commentId})}" method="post">
                            <input type="hidden" name="postId" th:value="${post.postId}">
                            <button type="submit" class="comment-delete-btn">삭제</button>
                        </form>
                    </th:block>
                </div>
            </div>

            <!-- 댓글 작성 폼 -->
            <form th:action="@{/board/{id}/comment(id=${post.postId})}" method="post" class="comment-form">
            <textarea name="content"
                      required
                      placeholder="댓글을 입력하세요"
                      style="width:100%; height:90px; padding:10px; border:1px solid #ddd; border-radius:8px; resize:none;"></textarea>
                <button type="submit" class="board-btn board-btn-primary" style="margin-top:10px;">
                    댓글 작성
                </button>
            </form>
        </div>
    </div>
</section>
</body>
</html>
