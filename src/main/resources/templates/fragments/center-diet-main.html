<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="centerDietMain" class="diet-page">

    <section class="diet-header-card">
        <div class="diet-header-left">
            <h2>식단 관리</h2>
            <p th:text="${selectedDate}">2026-04-01</p>
        </div>

        <form th:action="@{/diet}" method="get" class="diet-date-form">
            <input type="hidden" name="period" th:value="${period}">
            <input type="date" name="date" th:value="${selectedDate}">
            <button type="submit">조회</button>
        </form>
    </section>

    <section class="diet-dashboard-card">
        <h3>오늘 상태</h3>

        <div class="dashboard-grid">
            <div class="dashboard-item" id="goal-card">
                <span class="label">목표 칼로리</span>
                <strong class="kcal-goal count-up"
                        th:attr="data-value=${dietGoalSummary['goalKcal']}">0.0</strong>
                <span class="unit">kcal</span>
            </div>

            <div class="dashboard-item" id="intake-card">
                <span class="label">현재 섭취</span>
                <strong class="kcal-intake count-up"
                        th:attr="data-value=${dietGoalSummary['totalKcal']}">0.0</strong>
                <span class="unit">kcal</span>
            </div>

            <div class="dashboard-item">
                <span class="label">남은 칼로리</span>
                <strong class="kcal-remaining count-up"
                        th:classappend="${dietGoalSummary['remainingKcal']} < 0 ? ' kcal-over' : ''"
                        th:attr="data-value=${dietGoalSummary['remainingKcal']}">0.0</strong>
                <span class="unit">kcal</span>
            </div>
        </div>
    </section>

    <section class="diet-content-grid" id="diet-input-box">
        <section class="diet-form-card">
            <h3>식단 추가</h3>

            <form th:action="@{/diet/add}" method="post" class="diet-form">
                <input type="hidden" name="mealDate" th:value="${selectedDate}">

                <div class="input-mode-box">
                    <label class="radio-label">
                        <input type="radio" name="inputMode" value="select" checked> 목록 선택
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="inputMode" value="custom"> 직접 입력
                    </label>
                </div>

                <div class="form-row checkbox-row">
                    <label class="checkbox-label">
                        <input type="checkbox" name="saveAsFood">
                        자주 먹는 음식으로 저장
                    </label>
                </div>

                <div class="form-row">
                    <label for="mealType">식사 구분</label>
                    <select id="mealType" name="mealType" required>
                        <option value="">선택</option>
                        <option value="BREAKFAST">아침</option>
                        <option value="LUNCH">점심</option>
                        <option value="DINNER">저녁</option>
                        <option value="SNACK">간식</option>
                    </select>
                </div>

                <div id="selectModeFields">
                    <div class="form-row">
                        <label for="foodId">음식</label>
                        <select id="foodId" name="foodId">
                            <option value="">음식 선택</option>
                            <option th:each="food : ${foodList}"
                                    th:value="${food.foodId}"
                                    th:text="${food.foodName}"
                                    th:attr="data-base-amount=${food.baseAmountG},
                                         data-calories=${food.caloriesKcal},
                                         data-carb=${food.carbG},
                                         data-protein=${food.proteinG},
                                         data-fat=${food.fatG}">
                                음식명
                            </option>
                        </select>
                    </div>

                    <div class="select-food-preview-grid">
                        <div class="form-row">
                            <label for="selectedBaseAmountG">기준량(g)</label>
                            <input type="number" id="selectedBaseAmountG" readonly placeholder="자동 표시">
                        </div>

                        <div class="form-row">
                            <label for="selectedCaloriesKcal">칼로리 (100g 기준)</label>
                            <input type="number" id="selectedCaloriesKcal" readonly placeholder="자동 표시">
                        </div>

                        <div class="form-row">
                            <label for="selectedCarbG">탄수화물 (100g 기준)</label>
                            <input type="number" id="selectedCarbG" readonly placeholder="자동 표시">
                        </div>

                        <div class="form-row">
                            <label for="selectedProteinG">단백질 (100g 기준)</label>
                            <input type="number" id="selectedProteinG" readonly placeholder="자동 표시">
                        </div>

                        <div class="form-row">
                            <label for="selectedFatG">지방 (100g 기준)</label>
                            <input type="number" id="selectedFatG" readonly placeholder="자동 표시">
                        </div>
                    </div>
                </div>

                <div id="customModeFields" style="display:none;">
                    <div class="form-row">
                        <label for="customFoodName">음식명</label>
                        <input type="text" id="customFoodName" name="customFoodName" placeholder="예: 김치찌개">
                    </div>

                    <div class="form-row">
                        <label for="customBaseAmountG">기준량(g)</label>
                        <input type="number" step="0.1" id="customBaseAmountG" name="customBaseAmountG" placeholder="예: 150">
                    </div>

                    <div class="form-row">
                        <label for="customCaloriesKcal">칼로리 (100g 기준)</label>
                        <input type="number" step="0.1" id="customCaloriesKcal" name="customCaloriesKcal" placeholder="예: 80">
                    </div>

                    <div class="form-row">
                        <label for="customCarbG">탄수화물 (100g 기준)</label>
                        <input type="number" step="0.1" id="customCarbG" name="customCarbG" placeholder="예: 5">
                    </div>

                    <div class="form-row">
                        <label for="customProteinG">단백질 (100g 기준)</label>
                        <input type="number" step="0.1" id="customProteinG" name="customProteinG" placeholder="예: 4">
                    </div>

                    <div class="form-row">
                        <label for="customFatG">지방 (100g 기준)</label>
                        <input type="number" step="0.1" id="customFatG" name="customFatG" placeholder="예: 3">
                    </div>
                </div>

                <div class="form-row">
                    <label for="count">개수</label>
                    <input type="number" id="count" name="count" min="1" value="1" required>
                </div>

                <div class="form-row">
                    <button type="submit" class="submit-btn">추가하기</button>
                </div>
            </form>
        </section>

        <section class="diet-visual-card">
            <div class="visual-section">
                <h3 id="dietChartTitle">최근 7일 섭취량</h3>

                <div class="chart-tabs" id="dietChartTabs">
                    <button type="button" class="chart-tab active" data-period="day">일</button>
                    <button type="button" class="chart-tab" data-period="week">주</button>
                    <button type="button" class="chart-tab" data-period="month">월</button>
                    <button type="button" class="chart-tab" data-period="year">년</button>
                </div>

                <p class="chart-sub-text" id="dietChartSubText">선택한 기간 기준 섭취 칼로리를 보여줍니다.</p>

                <div class="chart-box intake-chart-box">
                    <canvas id="dietIntakeChart"></canvas>
                </div>
            </div>

            <div class="visual-section">
                <h3>탄단지 비율</h3>
                <div class="chart-box macro-chart-box">
                    <canvas id="macroRatioChart"></canvas>
                </div>

                <div class="macro-legend">
                    <div class="macro-item">
                        <span class="dot carb"></span>
                        <span>탄수화물</span>
                        <strong th:text="${#numbers.formatDecimal(dailySummary != null ? dailySummary['carb'] : 0, 1, 1)} + 'g'">0.0g</strong>
                    </div>
                    <div class="macro-item">
                        <span class="dot protein"></span>
                        <span>단백질</span>
                        <strong th:text="${#numbers.formatDecimal(dailySummary != null ? dailySummary['protein'] : 0, 1, 1)} + 'g'">0.0g</strong>
                    </div>
                    <div class="macro-item">
                        <span class="dot fat"></span>
                        <span>지방</span>
                        <strong th:text="${#numbers.formatDecimal(dailySummary != null ? dailySummary['fat'] : 0, 1, 1)} + 'g'">0.0g</strong>
                    </div>
                </div>
            </div>
        </section>
    </section>


    <script th:inline="javascript">
        window.dietChartDataMap = {
            day: {
                labels: /*[[${dietDayChart.labels}]]*/ [],
                calories: /*[[${dietDayChart.calories}]]*/ [],
                goalKcal: /*[[${dietDayChart.goalKcal}]]*/ 0
            },
            week: {
                labels: /*[[${dietWeekChart.labels}]]*/ [],
                calories: /*[[${dietWeekChart.calories}]]*/ [],
                goalKcal: /*[[${dietWeekChart.goalKcal}]]*/ 0
            },
            month: {
                labels: /*[[${dietMonthChart.labels}]]*/ [],
                calories: /*[[${dietMonthChart.calories}]]*/ [],
                goalKcal: /*[[${dietMonthChart.goalKcal}]]*/ 0
            },
            year: {
                labels: /*[[${dietYearChart.labels}]]*/ [],
                calories: /*[[${dietYearChart.calories}]]*/ [],
                goalKcal: /*[[${dietYearChart.goalKcal}]]*/ 0
            }
        };

        window.macroRatioData = {
            carb: /*[[${dailySummary != null ? dailySummary['carb'] : 0}]]*/ 0,
            protein: /*[[${dailySummary != null ? dailySummary['protein'] : 0}]]*/ 0,
            fat: /*[[${dailySummary != null ? dailySummary['fat'] : 0}]]*/ 0
        };
    </script>

    <section class="diet-list-card">
        <h3>오늘 식단 기록</h3>

        <div th:if="${mealLogs == null or #lists.isEmpty(mealLogs)}" class="empty-box">
            등록된 식단이 없습니다.
        </div>

        <table th:if="${mealLogs != null and !#lists.isEmpty(mealLogs)}" class="diet-table">
            <thead>
            <tr>
                <th>식사구분</th>
                <th>음식명</th>
                <th>섭취량(g)</th>
                <th>칼로리</th>
                <th>탄수화물</th>
                <th>단백질</th>
                <th>지방</th>
                <th>삭제</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="meal : ${mealLogs}">
                <td>
                    <span class="meal-badge" th:switch="${meal.mealType}">
                        <span th:case="'BREAKFAST'">아침</span>
                        <span th:case="'LUNCH'">점심</span>
                        <span th:case="'DINNER'">저녁</span>
                        <span th:case="*">간식</span>
                    </span>
                </td>
                <td th:text="${meal.foodNameSnapshot}">달걀</td>
                <td th:text="${#numbers.formatDecimal(meal.intakeG, 1, 1)}">120.0</td>
                <td th:text="${#numbers.formatDecimal(meal.caloriesKcal, 1, 1)}">186.0</td>
                <td th:text="${#numbers.formatDecimal(meal.carbG, 1, 1)}">1.3</td>
                <td th:text="${#numbers.formatDecimal(meal.proteinG, 1, 1)}">15.6</td>
                <td th:text="${#numbers.formatDecimal(meal.fatG, 1, 1)}">13.2</td>
                <td>
                    <form th:action="@{/diet/delete/{mealLogId}(mealLogId=${meal.mealLogId})}" method="post">
                        <input type="hidden" name="date" th:value="${selectedDate}">
                        <button type="submit" class="delete-btn">삭제</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </section>

</div>
</body>
</html>
