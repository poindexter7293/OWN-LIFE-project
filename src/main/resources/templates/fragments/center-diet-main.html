<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="centerDietMain" class="diet-page">

    <!-- 헤더 카드 유지 -->
    <section class="diet-header-card">
        <div class="diet-header-left">
            <h2>식단 관리</h2>
            <p th:text="${dietPageData.selectedDate}">2026-04-01</p>
        </div>

        <form th:action="@{/diet}" method="get" class="diet-date-form diet-date-pill-form">
            <div class="diet-date-pill">
                <input type="date"
                       name="date"
                       th:value="${dietPageData.selectedDate}"
                       class="diet-date-input">
                <button type="submit" class="diet-date-move-btn">이동</button>
            </div>
        </form>
    </section>

    <!-- 감싸는 영역 없이 카드 3장만 -->
    <section class="diet-summary-grid">
        <article class="diet-summary-card"
                 id="goal-card"
                 role="button"
                 tabindex="0"
                 aria-label="마이페이지의 목표 섭취 칼로리 설정으로 이동"
                 th:attr="data-mypage-url=@{/mypage}">
            <span class="diet-summary-card__label">목표 칼로리</span>
            <div class="diet-summary-card__value diet-summary-card__value--purple">
                <strong class="count-up"
                        th:attr="data-value=${dietPageData.goalSummary.goalKcal}">0.0</strong>
                <small>kcal</small>
            </div>
        </article>

        <article class="diet-summary-card" id="intake-card">
            <span class="diet-summary-card__label">현재 섭취</span>
            <div class="diet-summary-card__value diet-summary-card__value--green">
                <strong class="count-up"
                        th:attr="data-value=${dietPageData.goalSummary.totalKcal}">0.0</strong>
                <small>kcal</small>
            </div>
        </article>

        <article class="diet-summary-card">
            <span class="diet-summary-card__label">남은 칼로리</span>
            <div class="diet-summary-card__value [[${dietPageData.goalSummary.exceededKcal > 0} ? 'diet-summary-card__value--red' : 'diet-summary-card__value--green']]">
                <strong class="count-up"
                        th:attr="data-value=${dietPageData.goalSummary.remainingKcal}">0.0</strong>
                <small>kcal</small>
            </div>
        </article>
    </section>

    <section class="diet-content-grid" id="diet-input-box">
        <section class="diet-form-card">
            <h3>식단 추가</h3>

            <form th:action="@{/diet/add}" method="post" class="diet-form">
                <input type="hidden" name="mealDate" th:value="${dietPageData.selectedDate}">

                <div class="input-mode-box">
                    <label class="radio-label">
                        <input type="radio" name="inputMode" value="select" checked> 목록 선택
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="inputMode" value="custom"> 직접 입력
                    </label>
                </div>

                <div class="form-row checkbox-row">
                    <label class="checkbox-label">
                        <input type="checkbox" name="saveAsFood">
                        자주 먹는 음식으로 저장
                    </label>
                </div>

                <div class="form-row">
                    <label for="mealType">식사 구분</label>
                    <select id="mealType" name="mealType" required>
                        <option value="">선택</option>
                        <option value="BREAKFAST">아침</option>
                        <option value="LUNCH">점심</option>
                        <option value="DINNER">저녁</option>
                        <option value="SNACK">간식</option>
                    </select>
                </div>

                <div id="selectModeFields">
                    <div class="form-row">
                        <label for="foodSearchKeyword">음식 검색</label>
                        <input type="text"
                               id="foodSearchKeyword"
                               placeholder="예: 닭가슴살, 바나나, 라떼">

                        <label for="foodId">음식</label>
                        <select id="foodId" name="foodId" size="5">
                            <option value="">음식 선택</option>
                            <option th:each="food : ${foodList}"
                                    th:value="${food.foodId}"
                                    th:text="${food.foodName}"
                                    th:attr="data-base-amount=${food.baseAmountG},
                                             data-calories=${food.caloriesKcal},
                                             data-carb=${food.carbG},
                                             data-protein=${food.proteinG},
                                             data-fat=${food.fatG}">
                                음식명
                            </option>
                        </select>

                        <small id="foodSearchResultText" class="food-search-result-text">
                            검색어를 입력하면 목록이 줄어듭니다.
                        </small>
                    </div>

                    <div class="form-row">
                        <button type="button" class="add-food-btn" id="addSelectedFoodBtn">선택 음식 담기</button>
                    </div>

                    <div class="selected-foods-box">
                        <div class="selected-foods-header">
                            <h4>선택한 음식</h4>
                            <span id="selectedFoodCount">0개</span>
                        </div>

                        <div id="selectedFoodList" class="selected-food-list">
                            <div class="selected-food-empty">아직 담긴 음식이 없습니다.</div>
                        </div>
                    </div>

                    <input type="hidden" name="selectedFoodsJson" id="selectedFoodsJson">

                    <div class="select-food-preview-grid">
                        <div class="form-row">
                            <label for="selectedBaseAmountG">기준량(g)</label>
                            <input type="number" id="selectedBaseAmountG" readonly placeholder="자동 표시">
                        </div>

                        <div class="form-row">
                            <label for="selectedCaloriesKcal">칼로리 (100g 기준)</label>
                            <input type="number" id="selectedCaloriesKcal" readonly placeholder="자동 표시">
                        </div>

                        <div class="form-row">
                            <label for="selectedCarbG">탄수화물 (100g 기준)</label>
                            <input type="number" id="selectedCarbG" readonly placeholder="자동 표시">
                        </div>

                        <div class="form-row">
                            <label for="selectedProteinG">단백질 (100g 기준)</label>
                            <input type="number" id="selectedProteinG" readonly placeholder="자동 표시">
                        </div>

                        <div class="form-row">
                            <label for="selectedFatG">지방 (100g 기준)</label>
                            <input type="number" id="selectedFatG" readonly placeholder="자동 표시">
                        </div>
                    </div>
                </div>

                <div id="customModeFields" style="display:none;">
                    <div class="form-row">
                        <label for="customFoodName">음식명</label>
                        <input type="text" id="customFoodName" name="customFoodName" placeholder="예: 김치찌개">
                    </div>

                    <div class="form-row">
                        <label for="customBaseAmountG">기준량(g)</label>
                        <input type="number" step="0.1" id="customBaseAmountG" name="customBaseAmountG" placeholder="예: 150">
                    </div>

                    <div class="form-row">
                        <label for="customCaloriesKcal">칼로리 (100g 기준)</label>
                        <input type="number" step="0.1" id="customCaloriesKcal" name="customCaloriesKcal" placeholder="예: 80">
                    </div>

                    <div class="form-row">
                        <label for="customCarbG">탄수화물 (100g 기준)</label>
                        <input type="number" step="0.1" id="customCarbG" name="customCarbG" placeholder="예: 5">
                    </div>

                    <div class="form-row">
                        <label for="customProteinG">단백질 (100g 기준)</label>
                        <input type="number" step="0.1" id="customProteinG" name="customProteinG" placeholder="예: 4">
                    </div>

                    <div class="form-row">
                        <label for="customFatG">지방 (100g 기준)</label>
                        <input type="number" step="0.1" id="customFatG" name="customFatG" placeholder="예: 3">
                    </div>
                </div>

                <div class="form-row">
                    <label for="count">개수</label>
                    <input type="number" id="count" name="count" min="0.5" step="0.5" value="1.0" required>
                </div>

                <div class="form-row">
                    <button type="submit" class="submit-btn">식단 저장하기</button>
                </div>
            </form>
        </section>

        <section class="diet-visual-card">
            <div class="visual-section">
                <div class="diet-chart-head">
                    <h3 id="dietChartTitle">최근 7일 섭취량</h3>

                    <div class="chart-tabs" id="dietChartTabs">
                        <button type="button" class="chart-tab active" data-period="day">일간</button>
                        <button type="button" class="chart-tab" data-period="week">주간</button>
                        <button type="button" class="chart-tab" data-period="month">월간</button>
                        <button type="button" class="chart-tab" data-period="year">연간</button>
                    </div>
                </div>

                <p class="chart-sub-text" id="dietChartSubText">선택한 기간 기준 섭취 칼로리를 보여줍니다.</p>

                <!-- 도트 범례 -->
                <div class="chart-dot-legend">
                    <div class="chart-dot-legend__item">
                        <span class="chart-dot chart-dot--green"></span>
                        <span>섭취 칼로리</span>
                    </div>
                    <div class="chart-dot-legend__item">
                        <span class="chart-dot chart-dot--orange"></span>
                        <span>목표 칼로리</span>
                    </div>
                </div>

                <div class="chart-box intake-chart-box">
                    <canvas id="dietIntakeChart"></canvas>
                </div>
            </div>

            <div class="visual-section">
                <h3>탄단지 비율</h3>
                <div class="chart-box macro-chart-box">
                    <canvas id="macroRatioChart"></canvas>
                </div>

                <div class="macro-legend">
                    <div class="macro-item">
                        <span class="dot carb"></span>
                        <span>탄수화물</span>
                        <strong th:text="${#numbers.formatDecimal(dietPageData.dailySummary.carb, 1, 1)} + 'g'">0.0g</strong>
                    </div>
                    <div class="macro-item">
                        <span class="dot protein"></span>
                        <span>단백질</span>
                        <strong th:text="${#numbers.formatDecimal(dietPageData.dailySummary.protein, 1, 1)} + 'g'">0.0g</strong>
                    </div>
                    <div class="macro-item">
                        <span class="dot fat"></span>
                        <span>지방</span>
                        <strong th:text="${#numbers.formatDecimal(dietPageData.dailySummary.fat, 1, 1)} + 'g'">0.0g</strong>
                    </div>
                </div>
            </div>
        </section>
    </section>

    <script th:inline="javascript">
        window.dietChartDataMap = {
            day: {
                labels: /*[[${dietPageData.charts.day.labels}]]*/ [],
                calories: /*[[${dietPageData.charts.day.calories}]]*/ [],
                goalKcal: /*[[${dietPageData.charts.day.goalKcal}]]*/ 0,
                goalKcalSeries: /*[[${dietPageData.charts.day.goalKcalSeries}]]*/ []
            },
            week: {
                labels: /*[[${dietPageData.charts.week.labels}]]*/ [],
                calories: /*[[${dietPageData.charts.week.calories}]]*/ [],
                goalKcal: /*[[${dietPageData.charts.week.goalKcal}]]*/ 0,
                goalKcalSeries: /*[[${dietPageData.charts.week.goalKcalSeries}]]*/ []
            },
            month: {
                labels: /*[[${dietPageData.charts.month.labels}]]*/ [],
                calories: /*[[${dietPageData.charts.month.calories}]]*/ [],
                goalKcal: /*[[${dietPageData.charts.month.goalKcal}]]*/ 0,
                goalKcalSeries: /*[[${dietPageData.charts.month.goalKcalSeries}]]*/ []
            },
            year: {
                labels: /*[[${dietPageData.charts.year.labels}]]*/ [],
                calories: /*[[${dietPageData.charts.year.calories}]]*/ [],
                goalKcal: /*[[${dietPageData.charts.year.goalKcal}]]*/ 0,
                goalKcalSeries: /*[[${dietPageData.charts.year.goalKcalSeries}]]*/ []
            }
        };

        window.macroRatioData = {
            carb: /*[[${dietPageData.dailySummary.carb}]]*/ 0,
            protein: /*[[${dietPageData.dailySummary.protein}]]*/ 0,
            fat: /*[[${dietPageData.dailySummary.fat}]]*/ 0
        };
    </script>

    <section class="diet-list-card">
        <h3>오늘 식단 기록</h3>

        <div th:if="${dietPageData.mealGroups == null or #lists.isEmpty(dietPageData.mealGroups)}"
             class="empty-box"
             id="mealSummaryEmpty">
            등록된 식단이 없습니다.
        </div>

        <div th:if="${dietPageData.mealGroups != null and !#lists.isEmpty(dietPageData.mealGroups)}"
             class="meal-summary-list"
             id="mealSummaryList">

            <div class="meal-summary-item" th:each="group : ${dietPageData.mealGroups}">
                <div class="meal-summary-line">
                    <span class="meal-summary-type" th:text="${group.mealTypeLabel + ':'}">아침:</span>

                    <span class="meal-summary-foods">
                        <th:block th:each="item, stat : ${group.items}">
                            <span th:text="${item.foodName}">음식명</span><span th:if="${!stat.last}">, </span>
                        </th:block>
                    </span>

                    <span class="meal-summary-total">
                        소계:
                        <span th:text="${#numbers.formatDecimal(group.subtotalKcal, 1, 1)}">0.0</span>
                        kcal
                    </span>

                    <button type="button"
                            class="meal-group-delete-btn"
                            th:attr="data-meal-type=${group.mealType}, data-date=${dietPageData.selectedDate}">
                        삭제
                    </button>
                </div>
            </div>

        </div>
    </section>

</div>
</body>
</html>
