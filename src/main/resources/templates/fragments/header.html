<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="siteHeader" class="header-wrap">

    <div class="top-header">
        <div class="brand-area">
            <a class="brand-link" th:href="@{/}">
                <div class="brand-logo">O</div>
                <div class="brand-text">OWN라이프</div>
            </a>
        </div>

        <div class="auth-menu" th:if="${session.loginMember == null}">
            <a class="auth-pill" th:href="@{/login}">로그인</a>
            <a class="auth-pill auth-pill--primary" th:href="@{/signup}">회원가입</a>
        </div>

        <div class="auth-menu" th:if="${session.loginMember != null}">
            <span th:text="|${session.loginMember.nickname}님|"></span>
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="auth-pill">로그아웃</button>
            </form>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-inner">
            <a class="nav-item"
               th:classappend="${centerFragment != null and #strings.contains(centerFragment, 'center-dashboard')} ? ' active' : ''"
               th:href="@{/}">
                홈
            </a>

            <a class="nav-item"
               th:href="@{/diet}"
               data-login-required="true">
                식단 관리
            </a>

            <a class="nav-item"
               th:classappend="${centerFragment != null and #strings.contains(centerFragment, 'center-exercise')} ? ' active' : ''"
               th:href="@{/exercise}"
               data-login-required="true">
                운동 일지
            </a>

            <a class="nav-item"
               th:classappend="${centerFragment != null and #strings.contains(centerFragment, 'center-board')} ? ' active' : ''"
               th:href="@{/board}">
                게시판
            </a>

            <a class="nav-item"
               th:classappend="${centerFragment != null and #strings.contains(centerFragment, 'center-mypage')} ? ' active' : ''"
               th:href="@{/mypage}"
               data-login-required="true">
                마이페이지
            </a>

            <a class="nav-item"
               th:if="${session.loginMember != null and session.loginMember.role != null and session.loginMember.role.name() == 'ADMIN'}"
               th:classappend="${centerFragment != null and #strings.contains(centerFragment, 'center-admin-members')} ? ' active' : ''"
               th:href="@{/admin/members}">
                회원 관리
            </a>
        </div>
    </div>
</div>
</body>
</html>
