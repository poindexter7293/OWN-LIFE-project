<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>글쓰기</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .wrap { max-width: 900px; margin: 0 auto; }
        input, textarea { width: 100%; padding: 12px; margin-top: 10px; margin-bottom: 20px; }
        textarea { height: 250px; resize: none; }
        .btns { display: flex; gap: 10px; }
        .btn { padding: 10px 16px; border: none; border-radius: 6px; cursor: pointer; text-decoration: none; }
        .blue { background: #4a90e2; color: white; }
        .gray { background: #999; color: white; }
    </style>
</head>
<body>
<div class="wrap">
    <h1>글쓰기</h1>
    <form th:action="@{/board/write}" method="post">
        <label>제목</label>
        <input type="text" name="title" required>

        <label>내용</label>
        <textarea name="content" required></textarea>

        <div class="btns">
            <button type="submit" class="btn blue">등록</button>
            <a th:href="@{/board}" class="btn gray">취소</a>
        </div>
    </form>
</div>
</body>
</html>
