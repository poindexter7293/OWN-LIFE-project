<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">OWN LIFE</title>

    <!-- AI 코치 줄높이 수정이 즉시 반영되도록 main.css에 버전 파라미터를 붙인다. -->
    <link rel="stylesheet" th:href="@{/css/main.css(v='20260410-ai-coach-line-height')}">
    <link rel="stylesheet" th:href="@{/css/board.css}">
    <link rel="stylesheet"
          th:if="${extraCssFiles != null}"
          th:each="cssFile : ${extraCssFiles}"
          th:href="${cssFile}">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="page-bg">
    <div class="main-shell">
        <header th:replace="~{fragments/header :: siteHeader}"></header>

        <main class="content-wrap">
            <section th:replace="~{__${centerFragment}__}"></section>
        </main>
    </div>
</div>

<script th:inline="javascript">
    window.dashboardData = {
        weight: /*[[${#ctx.containsVariable('dashboard') and dashboard != null
            ? dashboard.weight
            : (#ctx.containsVariable('weight') ? weight : null)}]]*/ null,

        weightDiff: /*[[${#ctx.containsVariable('dashboard') and dashboard != null
            ? dashboard.weightDiff
            : (#ctx.containsVariable('weightDiff') ? weightDiff : 0)}]]*/ 0,

        weightDiffText: /*[[${#ctx.containsVariable('dashboard') and dashboard != null
            ? dashboard.weightDiffText
            : ''}]]*/ '',

        weightDiffTone: /*[[${#ctx.containsVariable('dashboard') and dashboard != null
            ? dashboard.weightDiffTone
            : 'muted'}]]*/ 'muted',

        goalWeightText: /*[[${#ctx.containsVariable('dashboard') and dashboard != null
            ? dashboard.goalWeightText
            : ''}]]*/ '',

        streakDays: /*[[${#ctx.containsVariable('dashboard') and dashboard != null
            ? dashboard.streakDays
            : (#ctx.containsVariable('streakDays') ? streakDays : 0)}]]*/ 0,

        streakMessage: /*[[${#ctx.containsVariable('dashboard') and dashboard != null
            ? dashboard.streakMessage
            : ''}]]*/ '',

        streakTone: /*[[${#ctx.containsVariable('dashboard') and dashboard != null
            ? dashboard.streakTone
            : 'danger'}]]*/ 'danger',

        burnedCalories: /*[[${#ctx.containsVariable('dashboard') and dashboard != null
            ? dashboard.burnedCalories
            : (#ctx.containsVariable('burnedCalories') ? burnedCalories : 0)}]]*/ 0,

        burnedTargetCalories: /*[[${#ctx.containsVariable('dashboard') and dashboard != null
            ? dashboard.burnedTargetCalories
            : (#ctx.containsVariable('burnedTargetCalories')
                ? burnedTargetCalories
                : (#ctx.containsVariable('targetBurnedCalories')
                    ? targetBurnedCalories
                    : 0))}]]*/ 0,

        burnedPercent: /*[[${#ctx.containsVariable('dashboard') and dashboard != null
            ? dashboard.burnedPercent
            : (#ctx.containsVariable('burnedPercent') ? burnedPercent : 0)}]]*/ 0,

        intakeCalories: /*[[${#ctx.containsVariable('dashboard') and dashboard != null
            ? dashboard.intakeCalories
            : (#ctx.containsVariable('intakeCalories') ? intakeCalories : 0)}]]*/ 0,

        intakeTargetCalories: /*[[${#ctx.containsVariable('dashboard') and dashboard != null
            ? dashboard.intakeTargetCalories
            : (#ctx.containsVariable('intakeTargetCalories')
                ? intakeTargetCalories
                : (#ctx.containsVariable('targetCalories')
                    ? targetCalories
                    : 0))}]]*/ 0,

        intakePercent: /*[[${#ctx.containsVariable('dashboard') and dashboard != null
            ? dashboard.intakePercent
            : (#ctx.containsVariable('intakePercent') ? intakePercent : 0)}]]*/ 0,

        carbPercent: /*[[${#ctx.containsVariable('dashboard') and dashboard != null
            ? dashboard.carbPercent
            : (#ctx.containsVariable('carbPercent') ? carbPercent : 0)}]]*/ 0,

        fatPercent: /*[[${#ctx.containsVariable('dashboard') and dashboard != null
            ? dashboard.fatPercent
            : (#ctx.containsVariable('fatPercent') ? fatPercent : 0)}]]*/ 0,

        proteinPercent: /*[[${#ctx.containsVariable('dashboard') and dashboard != null
            ? dashboard.proteinPercent
            : (#ctx.containsVariable('proteinPercent') ? proteinPercent : 0)}]]*/ 0,

        carbGram: /*[[${#ctx.containsVariable('dashboard') and dashboard != null
            ? dashboard.carbGram
            : (#ctx.containsVariable('carbGram') ? carbGram : 0)}]]*/ 0,

        fatGram: /*[[${#ctx.containsVariable('dashboard') and dashboard != null
            ? dashboard.fatGram
            : (#ctx.containsVariable('fatGram') ? fatGram : 0)}]]*/ 0,

        proteinGram: /*[[${#ctx.containsVariable('dashboard') and dashboard != null
            ? dashboard.proteinGram
            : (#ctx.containsVariable('proteinGram') ? proteinGram : 0)}]]*/ 0,

        weightLabels: /*[[${#ctx.containsVariable('dashboard') and dashboard != null
            ? dashboard.weightLabels
            : (#ctx.containsVariable('weightLabels') ? weightLabels : {})}]]*/ [],

        weightData: /*[[${#ctx.containsVariable('dashboard') and dashboard != null
            ? dashboard.weightData
            : (#ctx.containsVariable('weightData') ? weightData : {})}]]*/ []
    };

    window.isLoginMember = /*[[${session.loginMember != null}]]*/ false;
    window.loginPageUrl = /*[[@{/login}]]*/ '/login';
</script>

<script th:src="@{/js/main.js}"></script>
<script th:if="${extraJsFiles != null}"
        th:each="jsFile : ${extraJsFiles}"
        th:src="${jsFile}"></script>
<script th:src="@{/js/board.js}"></script>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const protectedLinks = document.querySelectorAll('[data-login-required="true"]');

        protectedLinks.forEach(function (link) {
            link.addEventListener('click', function (event) {
                if (!window.isLoginMember) {
                    event.preventDefault();
                    alert('로그인이 필요한 서비스입니다.');
                    window.location.href = window.loginPageUrl;
                }
            });
        });
    });
</script>
    <div id="aiCoachWrap">
        <button id="aiCoachFab" type="button" aria-label="OWN 트레이너 열기">
            💬
        </button>

        <div id="aiCoachPanel" class="hidden">
            <div class="ai-coach-header">
                <div>
                    <strong>OWN 트레이너</strong>
                    <p>최근 기록을 바탕으로 식단과 운동을 추천해드릴게요.</p>
                </div>
                <button id="aiCoachClose" type="button">✕</button>
            </div>

            <div class="ai-coach-body">
                <div class="ai-coach-summary-card">
                    <p class="summary-title">현재 상태</p>
                    <div class="ai-chat-text">
                        원하는 항목을 누르면 바로 분석해드릴게요.
                    </div>
                </div>

                <div class="ai-coach-quick-buttons">
                    <button type="button" data-ai-type="diet">오늘 식단 추천</button>
                    <button type="button" data-ai-type="exercise">오늘 운동 추천</button>
                    <button type="button" data-ai-type="analysis">최근 기록 분석</button>
                    <button type="button" data-ai-type="feedback">감량 피드백</button>
                </div>
                <div id="aiCoachChat" class="ai-coach-chat">
                    <div class="ai-chat-bubble ai">
                        <div class="ai-chat-name">OWN 트레이너</div>
                        <div class="ai-chat-text">
                            안녕하세요. 최근 기록을 바탕으로 식단과 운동을 같이 정리해드릴게요.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
