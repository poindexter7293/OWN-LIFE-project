<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">OWN LIFE</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet"
          th:if="${extraCssFiles != null}"
          th:each="cssFile : ${extraCssFiles}"
          th:href="${cssFile}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="page-bg">
    <div class="main-shell">

        <!-- header + nav 통합 -->
        <header th:replace="~{fragments/header :: siteHeader}"></header>

        <!-- center -->
        <main class="content-wrap">
            <section th:replace="~{__${centerFragment}__}"></section>
        </main>
    </div>
</div>

<script th:src="@{/js/main.js}"></script>
<script th:if="${extraJsFiles != null}"
        th:each="jsFile : ${extraJsFiles}"
        th:src="${jsFile}"></script>
<script th:inline="javascript">
    window.dashboardData = {
        weight: /*[[${weight}]]*/ null,
        weightDiff: /*[[${weightDiff}]]*/ null,
        burnedCalories: /*[[${burnedCalories}]]*/ null,
        burnedDiff: /*[[${burnedDiff}]]*/ null,
        intakeCalories: /*[[${intakeCalories}]]*/ null,
        targetCalories: /*[[${targetCalories}]]*/ null,
        carbPercent: /*[[${carbPercent}]]*/ null,
        fatPercent: /*[[${fatPercent}]]*/ null,
        proteinPercent: /*[[${proteinPercent}]]*/ null,
        weightLabels: /*[[${weightLabels}]]*/ [],
        weightData: /*[[${weightData}]]*/ []
    };
</script>
</body>
</html>
