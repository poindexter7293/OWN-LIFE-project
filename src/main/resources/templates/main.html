<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">OWN LIFE</title>

    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet"
          th:if="${extraCssFiles != null}"
          th:each="cssFile : ${extraCssFiles}"
          th:href="${cssFile}">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="page-bg">
    <div class="main-shell">
        <header th:replace="~{fragments/header :: siteHeader}"></header>

        <main class="content-wrap">
            <section th:replace="~{__${centerFragment}__}"></section>
        </main>
    </div>
</div>

<script th:inline="javascript">
    window.dashboardData = {
        weight: /*[[${dashboard != null ? dashboard.weight : 0}]]*/ 0,
        weightDiff: /*[[${dashboard != null ? dashboard.weightDiff : 0}]]*/ 0,
        streakDays: /*[[${dashboard != null ? dashboard.streakDays : 0}]]*/ 0,

        burnedCalories: /*[[${dashboard != null ? dashboard.burnedCalories : 0}]]*/ 0,
        burnedTargetCalories: /*[[${dashboard != null ? dashboard.burnedTargetCalories : 0}]]*/ 0,
        burnedPercent: /*[[${dashboard != null ? dashboard.burnedPercent : 0}]]*/ 0,

        intakeCalories: /*[[${dashboard != null ? dashboard.intakeCalories : 0}]]*/ 0,
        intakeTargetCalories: /*[[${dashboard != null ? dashboard.intakeTargetCalories : 0}]]*/ 0,
        intakePercent: /*[[${dashboard != null ? dashboard.intakePercent : 0}]]*/ 0,

        carbPercent: /*[[${dashboard != null ? dashboard.carbPercent : 0}]]*/ 0,
        fatPercent: /*[[${dashboard != null ? dashboard.fatPercent : 0}]]*/ 0,
        proteinPercent: /*[[${dashboard != null ? dashboard.proteinPercent : 0}]]*/ 0,

        carbGram: /*[[${dashboard != null ? dashboard.carbGram : 0}]]*/ 0,
        fatGram: /*[[${dashboard != null ? dashboard.fatGram : 0}]]*/ 0,
        proteinGram: /*[[${dashboard != null ? dashboard.proteinGram : 0}]]*/ 0,

        weightLabels: /*[[${dashboard != null ? dashboard.weightLabels : {}}]]*/ [],
        weightData: /*[[${dashboard != null ? dashboard.weightData : {}}]]*/ []
    };

    window.isLoginMember = /*[[${session.loginMember != null}]]*/ false;
</script>

<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/common-login-guard.js}"></script>

<script th:if="${extraJsFiles != null}"
        th:each="jsFile : ${extraJsFiles}"
        th:src="${jsFile}"></script>
</body>
</html>
