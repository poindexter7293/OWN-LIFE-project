name: Maven CI

on:
  push:
    branches: [ GenonHyeong, HyeonWoo, SuHoon, main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 21 설치
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Maven 실행 권한 부여
        run: chmod +x mvnw

      - name: Maven 빌드
        run: ./mvnw clean package